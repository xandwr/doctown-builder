[package]
name = "doctown-builder"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.100"
zip = "6.0.0"
tree-sitter = "0.25.10"
tree-sitter-rust = "0.24.0"
tree-sitter-python = "0.25.0"
tree-sitter-javascript = "0.25.0"
tree-sitter-typescript = "0.23.2"
tree-sitter-go = "0.25.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tempfile = "3.15"
walkdir = "2.5"

[build-dependencies]
cc="*"